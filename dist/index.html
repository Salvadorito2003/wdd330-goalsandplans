<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals and Plans | Web Application</title>
    <meta name="author" content="Tobias Aguilar">
    <meta name="description" content="A web aplication were users can create their goals, get help from IA to improve those goals and schedule follow ups and report dates.">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script type="module" crossorigin src="/assets/index-CyKGgrdp.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-uV9FLRcq.css">
</head>
<body>
    <header id="main-header">
        
    </header>
    <main>
        <section class="hero">
            <img src="/assets/heroimg-BDSRIjFf.jpg" alt="Goals and Plans" width="auto" height="auto"/>
        </section>
        <section class="goals-and-tasks">
            <button id="connect-google">
                Connect Google Calendar
            </button>
            <div id="new-goals">
                <!--Fill with JS-->
                <label>Goal Title
                    <input id="goal-title" required>
                </label>

                <button id="add-task">Add Task</button>
                <div id="tasks"></div>

                <label> End Date
                    <input id="goal-date" type="date" required>
                </label>
                <label>
                    <input type="checkbox" id="calendar-reminder">
                    Add Reminder
                </label>
                <label id="reminder-date" hidden>
                    Reminder Date
                    <input id="reminder-input" type="date">
                </label>
                <button id="save-goal">
                    Save Goal
                </button>
            </div>
            <div id="all-tasks">
                <!--Fill with JS-->
            </div>
        </section>
    </main>
    <footer id="main-footer">
        
    </footer>
</body>
</html>
